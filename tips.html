<div class="container">

    <h2>Focus Tips</h2>

    <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search interruption...">
    <button class="search-btn" onclick="searchTips()">Search</button>
    <button class="search-btn" onclick="resetSearch()">Reset</button>
</div>

    <div id="list" class="list"></div>

    <div id="noResult" class="no-result"></div>

</div>
<div class="footer">
        <p>©️ Rakkez+.. Helping students build better study habits</p>

<script>
const data = [
    {
        reason: "Social Media",
        tips: ["Turn off notifications", "Use app blockers", "Use airplane mode"]
    },
    {
        reason: "Mobile Phone",
        tips: ["Keep phone away", "Use silent mode", "Set study timer"]
    },
    {
        reason: "Noise",
        tips: ["Use earplugs", "Study in quiet place", "Play white noise"]
    },
    {
        reason: "Lack of Motivation",
        tips: ["Set small goals", "Reward yourself", "Study with friend"]
    },
    {
        reason: "Fatigue",
        tips: ["Take breaks", "Sleep well", "Drink water"]
    }
];

function renderList(filtered) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    filtered.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = item.reason + "<span class='arrow'>▼</span>";

        const tipsDiv = document.createElement("div");
        tipsDiv.className = "tips";

        item.tips.forEach(t => {
            const p = document.createElement("p");
            p.textContent = "- " + t;
            tipsDiv.appendChild(p);
        });

        div.onclick = () => {
            tipsDiv.style.display = tipsDiv.style.display === "block" ? "none" : "block";
        };

        list.appendChild(div);
        list.appendChild(tipsDiv);
    });
}

function searchTips() {
    const value = document.getElementById("searchInput").value.toLowerCase();
    const result = data.filter(d => d.reason.toLowerCase().includes(value));

    if (result.length === 0) {
        document.getElementById("noResult").textContent = "No results found. Try a different keyword.";
        document.getElementById("list").innerHTML = "";
    } else {
        document.getElementById("noResult").textContent = "";
        renderList(result);
    }
    if (value === "") {
    renderList(data);
    document.getElementById("noResult").textContent = "";
}
}

function resetSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("noResult").textContent = "";
    renderList(data);
}
// ===== MENU =====
function toggleMenu() {
    const sidebar = document.getElementById("notification-sidebar");
    const overlay = document.getElementById("notification-overlay");

    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

renderList(data);
</script>
