<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Rakkez+</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

    <div class="home-navbar">
        <div class="home-logo">
            <a href="home.html"><img src="images/logo.jpeg" width="100"></a>
        </div>

        <div class="home-nav-links">
            <a href="home.html">Home</a>
            <a href="login.html">Log In</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <div class="signup-container">
        <h2>Sign Up</h2>
        <p class="signup-subtitle">Create your account and start your focus journey.</p>

        <form id="signupForm">
            <label for="signupName">Full Name</label>
            <input type="text"
                   id="signupName"
                   placeholder="Enter your name"
                   required
                   minlength="4">

            <label for="signupEmail">Email Address</label>
            <input type="email"
                   id="signupEmail"
                   placeholder="Enter your email"
                   required>

            <label for="signupPassword">Password</label>
            <div class="signup-password-box">
                <input type="password"
                       id="signupPassword"
                       placeholder="Enter your password"
                       required
                       minlength="8">

                <button type="button" onclick="toggleSignupPassword()">👁️</button>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <p>
            Already have an account?
            <a href="login.html">Log In</a>
        </p>

        <p id="signupMessage"></p>
    </div>

    <div class="footer">
        <p>© Rakkez+ - Helping students build better study habits</p>
    </div>

    <script>
        function toggleSignupPassword() {
            var pass = document.getElementById("signupPassword");
            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }

        document.getElementById("signupForm").addEventListener("submit", function(e) {
            e.preventDefault();

            var message = document.getElementById("signupMessage");
            message.style.color = "green";
            message.innerText = "Account created successfully!";

            setTimeout(function() {
                window.location.href = "login.html";
            }, 1200);
        });
    </script>

</body>
</html>
