<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakkez+ - Profile</title>
  <link rel="stylesheet" href="profile.css">
      <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar"> 
<div class="logo"> 
<a href="index.html"> 
<img src="images/logo.jpeg" width="100"> </a> </div> 
<div class="nav-links"> 
<a href="index.html">Main</a> 
<a href="home.html">Log Out</a> </div> </div>

<button class="menu-btn" onclick="toggleProfileMenu()">☰</button>


  <div id="profile-sidebar" class="profile-sidebar">
    <div class="profile-sidebar-header">
      <img id="sidebar-profile-img" src="images/default.png" alt="Profile">
      <h3 id="sidebar-profile-name">Ranem</h3>
    </div>

    <div class="profile-sidebar-links">
        <a href="profile.html">Profile</a>
		<a href="index.html">Main</a>
		<a href="tips.html">Tips</a>
        <a href="notifications.html">Notifications</a>
        <a href="support.html">Support</a>
    </div>

    <div class="profile-sidebar-footer">
      <button class="profile-logout-btn" onclick="goHome()">Log Out</button>
    </div>
  </div>

  <div id="profile-overlay" class="profile-overlay" onclick="toggleProfileMenu()"></div>

  <main class="profile-page">
    <div class="profile-card">
      <h1>My Profile</h1>
      <p class="profile-subtitle">View and edit your account details.</p>

      <div class="profile-layout">
        <div class="profile-left">
          <div class="profile-image-wrap">
            <img id="main-profile-img" class="profile-main-img" src="images/default.png" alt="Profile Picture">

            <button class="profile-icon-btn profile-image-edit" onclick="toggleImageOptions()" type="button">
              <img src="images/edit icon.png" alt="Edit">
            </button>
          </div>

          <div id="profile-image-options" class="profile-image-options">
            <div class="profile-option" onclick="selectProfileImage('images/medicine.png')">
              <img src="images/medicine.png" alt="Medicine">
              <span>Medicine</span>
            </div>

            <div class="profile-option" onclick="selectProfileImage('images/CS.png')">
              <img src="images/CS.png" alt="CS">
              <span>CS</span>
            </div>

            <div class="profile-option" onclick="selectProfileImage('images/eng.png')">
              <img src="images/eng.png" alt="Engineering">
              <span>Engineering</span>
            </div>

            <div class="profile-option" onclick="selectProfileImage('images/business.png')">
              <img src="images/business.png" alt="Business">
              <span>Business</span>
            </div>

            <div class="profile-option" onclick="selectProfileImage('images/default.png')">
              <img src="images/default.png" alt="Default">
              <span>Default</span>
            </div>
          </div>
        </div>

        <div class="profile-right">
          <label>Full Name</label>
          <div class="profile-inline">
            <input id="profile-name" type="text" value="Ranem Abdulaziz" readonly>
            <button class="profile-icon-btn" onclick="enableNameEdit()" type="button">
              <img src="images/edit icon.png" alt="Edit">
            </button>
            <button id="save-name-btn" class="profile-save-btn hidden" onclick="saveName()" type="button">Save</button>
          </div>

          <label>Email</label>
          <input type="email" value="RanemA@gmail.com" readonly>

          <div class="profile-password-header">
            <label>Current Password</label>
            <button class="profile-icon-btn" onclick="showPasswordEdit()" type="button">
              <img src="images/edit icon.png" alt="Edit">
            </button>
          </div>

          <input id="current-password" type="password" value="Aq@12345678" readonly>

          <div id="password-edit-box" class="password-edit-box">
            <label>New Password</label>
            <input id="new-password" type="password" placeholder="Enter new password">

            <label>Confirm New Password</label>
            <input id="confirm-password" type="password" placeholder="Confirm new password">

            <div class="profile-actions">
              <button class="profile-save-btn" onclick="confirmPasswordChange()" type="button">Confirm</button>
              <button class="profile-cancel-btn" onclick="cancelPasswordEdit()" type="button">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <p id="profile-message" class="profile-message"></p>
    </div>
  </main>

  <div class="footer">
    <p>©️ Rakkez+.. Helping students build better study habits</p>
  </div>

  <script>
    function toggleProfileMenu() {
      document.getElementById("profile-sidebar").classList.toggle("active");
      document.getElementById("profile-overlay").classList.toggle("active");
    }

    function goHome() {
      window.location.href = "home.html";
    }

    function toggleImageOptions() {
      document.getElementById("profile-image-options").classList.toggle("active");
    }

    function selectProfileImage(path) {
      document.getElementById("main-profile-img").src = path;
      document.getElementById("sidebar-profile-img").src = path;
      document.getElementById("profile-image-options").classList.remove("active");
      document.getElementById("profile-message").textContent = "Profile picture updated successfully.";
    }

    function enableNameEdit() {
      const nameInput = document.getElementById("profile-name");
      const saveBtn = document.getElementById("save-name-btn");

      nameInput.removeAttribute("readonly");
      nameInput.focus();
      saveBtn.classList.remove("hidden");
    }

    function saveName() {
      const nameInput = document.getElementById("profile-name");
      const nameValue = nameInput.value.trim();
      const saveBtn = document.getElementById("save-name-btn");

      if (nameValue.length < 4) {
        document.getElementById("profile-message").textContent = "Name must be at least 4 characters.";
        return;
      }

      nameInput.setAttribute("readonly", true);
      document.getElementById("sidebar-profile-name").textContent = nameValue;
      saveBtn.classList.add("hidden");
      document.getElementById("profile-message").textContent = "Name updated successfully.";
    }

    function showPasswordEdit() {
      document.getElementById("password-edit-box").classList.add("active");
      document.getElementById("profile-message").textContent = "";
    }

    function cancelPasswordEdit() {
      document.getElementById("password-edit-box").classList.remove("active");
      document.getElementById("new-password").value = "";
      document.getElementById("confirm-password").value = "";
      document.getElementById("profile-message").textContent = "Password change canceled.";
    }

    function confirmPasswordChange() {
      const newPassword = document.getElementById("new-password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (newPassword.length < 8) {
        document.getElementById("profile-message").textContent = "Password must be at least 8 characters.";
        return;
      }

      if (newPassword !== confirmPassword) {
        document.getElementById("profile-message").textContent = "Passwords do not match.";
        return;
      }

      document.getElementById("current-password").value = newPassword;
      document.getElementById("password-edit-box").classList.remove("active");
      document.getElementById("new-password").value = "";
      document.getElementById("confirm-password").value = "";
      document.getElementById("profile-message").textContent = "Password updated successfully.";
    }
  </script>
</body>
</html>
