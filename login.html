<!DOCTYPE html>
<html>
<head>
    <title>Login - Rakkez+</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

    <div class="home-navbar">
        <div class="home-logo">
            <a href="home.html"><img src="images/logo.jpeg" width="100"></a>
        </div>

        <div class="home-nav-links">
            <a href="home.html">Home</a>
            <a href="login.html">Log In</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <div class="login-container">
        <h2>Log In</h2>
        <p class="login-subtitle">Welcome back! Let’s keep you focused.</p>

        <form onsubmit="return handleLogin(event)">
            <label for="login-email">Email Address</label>
            <input type="email"
                   id="login-email"
                   placeholder="Enter your email"
                   required
                   pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">

            <label for="password">Password</label>
            <div class="login-password-box">
                <input type="password"
                       id="password"
                       placeholder="Enter your password"
                       required
                       minlength="6">

                <button type="button" onclick="togglePassword()">👁️</button>
            </div>

            <button type="submit" name="role" value="user" class="login-btn">
                Log In as User
            </button>

            <button type="submit" name="role" value="admin" class="login-btn admin-btn">
                Log In as Admin
            </button>
        </form>

        <p>
            Don’t have an account?
            <a href="signup.html">Sign Up</a>
        </p>
    </div>

    <div class="footer">
        <p>© Rakkez+ - Helping students build better study habits</p>
    </div>

    <script>
        function togglePassword() {
            var pass = document.getElementById("password");
            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }

        function handleLogin(event) {
            event.preventDefault();

            var role = event.submitter.value;

            if (role === "admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "main.html";
            }
        }
    </script>

</body>
</html>
